<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav" aria-label="Primary navigation">
        <a class="site-title" href="{{ '/' | relative_url }}">
          {{ site.masthead_title | default: site.title | escape_once | strip }}
        </a>
        <ul class="visible-links">
          {%- for link in site.data.navigation.main -%}
            {% assign link_target = link.url | relative_url %}
            <li class="masthead__menu-item{% if page.url == link_target or (link.url != '/' and page.url contains link.url) %} active{% endif %}">
              <a href="{{ link_target }}">{{ link.title }}</a>
            </li>
          {%- endfor -%}
        </ul>
        <button class="greedy-nav__toggle hidden" type="button">
          <span class="visually-hidden">Toggle Menu</span>
          <div class="navicon"></div>
        </button>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
